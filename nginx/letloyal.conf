# Nginx config for LetLoyal
# Replace YOUR_DOMAIN.com with your actual domain before deploying
# Deploy: sudo cp nginx/letloyal.conf /etc/nginx/sites-available/letloyal
#         sudo ln -s /etc/nginx/sites-available/letloyal /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Serve Next.js static assets directly (bypasses Node, cache 1 year)
    location /_next/static/ {
        alias /home/user/letloyal/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve public/ files directly
    location /public/ {
        root /var/www/letloyal;
        expires 7d;
    }

    # Proxy all other requests to Next.js on port 3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
